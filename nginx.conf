server {
    listen       80;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    # gzip static assets
    gzip on;
    gzip_types text/css application/javascript image/svg+xml application/json;
    gzip_min_length 512;

    # never cache the HTML shell so updates show immediately
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # cache JS/CSS for a week (they're small; bump on deploy)
    location ~* \.(js|css|svg|png|webmanifest)$ {
        add_header Cache-Control "public, max-age=604800";
    }

    # single-page style fallback to the shell
    location / {
        try_files $uri $uri/ /index.html;
    }
}
